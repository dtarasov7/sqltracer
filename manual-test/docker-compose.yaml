services:
  postgres:
    image: postgres:16-alpine
    container_name: pg
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "15432:5432"
    volumes:
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro

